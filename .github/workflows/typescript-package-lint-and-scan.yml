---
name: Lint and security scan for TypeScript
on:
  workflow_call:
    inputs:
      package-path:
        required: false
        type: string
        description: Path to a TypeScript project
        default: .
      node-version:
        required: false
        type: string
        description: Node.js version to use
        default: latest
      enable-cache:
        required: false
        type: boolean
        description: Cache package-manager downloads
        default: true
      cache-dependency-path:
        required: false
        type: string
        description: Lockfile used to scope the package-manager cache
        default: null
      use-biome:
        required: false
        type: boolean
        description: Use Biome to check formatting and linting
        default: true
      biome-glob:
        required: false
        type: string
        description: Glob pattern for Biome to check
        default: '**/*.{js,jsx,ts,tsx,json,css,scss}'
      use-oxlint:
        required: false
        type: boolean
        description: Use Oxlint to lint code
        default: true
      use-prettier:
        required: false
        type: boolean
        description: Use Prettier to check formatting
        default: false
      prettier-glob:
        required: false
        type: string
        description: Glob pattern for Prettier to check
        default: '**/*.{js,jsx,ts,tsx,css,scss,html,md}'
      use-eslint:
        required: false
        type: boolean
        description: Use ESLint to lint code
        default: false
      use-react:
        required: false
        type: boolean
        description: "Include React-specific ESLint plugins when ESLint is enabled (`use-eslint: true` required)"
        default: false
      use-tsc:
        required: false
        type: boolean
        description: Use TypeScript to check types
        default: true
      audit:
        required: false
        type: boolean
        description: Fix known security issues with the installed packages
        default: true
      additional-npm-packages:
        required: false
        type: string
        description: Additional NPM packages to install
        default: null
      runs-on:
        required: false
        type: string
        description: GitHub Actions runner to use
        default: ubuntu-slim
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  lint-and-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Detect the package manager
        working-directory: ${{ inputs.package-path }}
        run: |
          {
            if [[ -f package-lock.json ]]; then
              echo 'PACKAGE_LOCK_FILE=package-lock.json'
              echo 'PACKAGE_MANAGER=npm'
            elif [[ -f pnpm-lock.yaml ]]; then
              echo 'PACKAGE_LOCK_FILE=pnpm-lock.yaml'
              echo 'PACKAGE_MANAGER=pnpm'
            elif [[ -f yarn.lock ]]; then
              echo 'yarn.lock is not supported. Use package-lock.json or pnpm-lock.yaml.' >&2
              exit 1
            else
              echo 'PACKAGE_LOCK_FILE='
              echo 'PACKAGE_MANAGER='
            fi
          } | tee -a "${GITHUB_ENV}"
      - name: Setup pnpm
        if: env.PACKAGE_MANAGER == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: latest
      - name: Setup Node.js
        if: inputs.enable-cache && env.PACKAGE_MANAGER != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ env.PACKAGE_MANAGER }}
          cache-dependency-path: ${{ inputs.cache-dependency-path || format('{0}/{1}', inputs.package-path, env.PACKAGE_LOCK_FILE) }}
      - name: Setup Node.js without cache
        if: '! inputs.enable-cache || env.PACKAGE_MANAGER == '''''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Install dependencies
        env:
          ADDITIONAL_NPM_PACKAGES: ${{ inputs.additional-npm-packages }}
        working-directory: ${{ inputs.package-path }}
        run: | # zizmor: ignore[adhoc-packages] installs workflow-selected and caller-selected packages
          case "${PACKAGE_MANAGER:-}" in
            pnpm )
              pnpm install --frozen-lockfile
              pnpm add --save-dev \
                typescript \
                ${{ inputs.use-oxlint && 'oxlint' || '' }} \
                ${{ inputs.use-biome && 'biome' || '' }} \
                ${{ inputs.use-eslint && 'eslint eslint-plugin-security @typescript-eslint/eslint-plugin @typescript-eslint/parser' || '' }} \
                ${{ inputs.use-react && inputs.use-eslint && 'eslint-plugin-react eslint-plugin-react-hooks' || '' }} \
                ${{ inputs.use-prettier && 'prettier eslint-config-prettier eslint-plugin-prettier' || '' }}
              ;;
            * )
              if [[ -f package-lock.json ]]; then
                npm ci
              elif [[ -f package.json ]]; then
                npm install
              else
                :
              fi
              npm install --save-dev \
                typescript \
                ${{ inputs.use-oxlint && 'oxlint' || '' }} \
                ${{ inputs.use-biome && 'biome' || '' }} \
                ${{ inputs.use-eslint && 'eslint eslint-plugin-security @typescript-eslint/eslint-plugin @typescript-eslint/parser' || '' }} \
                ${{ inputs.use-react && inputs.use-eslint && 'eslint-plugin-react eslint-plugin-react-hooks' || '' }} \
                ${{ inputs.use-prettier && 'prettier eslint-config-prettier eslint-plugin-prettier' || '' }}
              ;;
          esac
          for p in $(tr ' ' '\n' <<< "${ADDITIONAL_NPM_PACKAGES}"); do
            if [[ -n "${p}" ]]; then
              case "${PACKAGE_MANAGER:-}" in
                pnpm )
                  pnpm add --save-dev "${p}"
                  ;;
                * )
                  npm install --save-dev "${p}"
                  ;;
              esac
            fi
          done
          echo "PATH=${PWD}/node_modules/.bin:${PATH}" >> "${GITHUB_ENV}"
      - name: Run Oxlint
        if: inputs.use-oxlint
        working-directory: ${{ inputs.package-path }}
        run: |
          if [[ -f tsconfig.json ]]; then
            oxlint --type-aware --tsconfig tsconfig.json .
          else
            oxlint .
          fi
      - name: Run ESLint
        if: inputs.use-eslint
        working-directory: ${{ inputs.package-path }}
        run: >
          eslint --ext .js,.jsx,.ts,.tsx --no-error-on-unmatched-pattern .
      - name: Check formatting and linting with Biome
        if: inputs.use-biome
        working-directory: ${{ inputs.package-path }}
        env:
          BIOME_GLOB: ${{ inputs.biome-glob }}
        run: >
          biome check --files-ignore-unknown=true --error-on-warnings "${BIOME_GLOB}"
      - name: Check formatting with Prettier
        if: inputs.use-prettier
        working-directory: ${{ inputs.package-path }}
        env:
          PRETTIER_GLOB: ${{ inputs.prettier-glob }}
        run: >
          prettier --check "${PRETTIER_GLOB}"
      - name: Check types with TypeScript
        if: inputs.use-tsc
        working-directory: ${{ inputs.package-path }}
        run: >
          tsc --noEmit
      - name: Run security audit
        if: inputs.audit
        working-directory: ${{ inputs.package-path }}
        run: |
          case "${PACKAGE_MANAGER:-}" in
            pnpm )
              pnpm audit
              ;;
            * )
              npm audit
              ;;
          esac
