---
name: Major version tag on GitHub
on:
  # release:
  #   types:
  #     - released
  workflow_call:
    inputs:
      minor-version-tag:
        required: false
        type: boolean
        description: Create a minor version tag (e.g., v1.1) in addition to the major version tag
        default: false
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
    secrets:
      GH_TOKEN:
        required: false
        description: GitHub token
  workflow_dispatch:  # checkov:skip=CKV_GHA_7:workflow_dispatch is used for manual trigger
    inputs:
      minor-version-tag:
        required: false
        type: boolean
        description: Create a minor version tag (e.g., v1.1) in addition to the major version tag
        default: false
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
permissions:
  contents: write
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  create-major-version-tag:
    runs-on: ${{ inputs.runs-on || 'ubuntu-slim' }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
      REPO_API: repos/${{ github.repository }}
    steps:
      - name: Fetch the latest release tag
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          tee -a "${GITHUB_ENV}" <<< "LATEST_TAG=$(
            gh release list --repo "${GITHUB_REPOSITORY}" --json tagName,isLatest \
              --jq '.[] | select(.isLatest) | .tagName'
          )"
      - name: Parse the major and minor version tags
        run: |
          if [[ -z "${LATEST_TAG:-}" ]]; then
            echo 'No latest release found' >&2
            exit 1
          elif [[ ! "${LATEST_TAG}" =~ ^(v?)([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            echo "Not a semantic version tag: ${LATEST_TAG}" >&2
            exit 1
          fi
          TAG_PREFIX="${BASH_REMATCH[1]}"
          {
            echo "MAJOR_TAG=${TAG_PREFIX}${BASH_REMATCH[2]}"
            echo "MINOR_TAG=${TAG_PREFIX}${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          } | tee -a "${GITHUB_ENV}"
      - name: Fetch the tag object metadata
        run: |
          read -r TAG_OBJECT_TYPE TAG_OBJECT_SHA < <(
            gh api "${REPO_API}/git/ref/tags/${LATEST_TAG}" \
              --jq '[.object.type, .object.sha] | @tsv'
          )
          {
            echo "TAG_OBJECT_TYPE=${TAG_OBJECT_TYPE}"
            echo "TAG_OBJECT_SHA=${TAG_OBJECT_SHA}"
          } | tee -a "${GITHUB_ENV}"
      - name: Resolve the tag commit SHA
        run: |
          if [[ "${TAG_OBJECT_TYPE}" == "tag" ]]; then
            TAG_SHA="$(gh api "${REPO_API}/git/tags/${TAG_OBJECT_SHA}" --jq '.object.sha')"
          else
            TAG_SHA="${TAG_OBJECT_SHA}"
          fi
          if [[ -z "${TAG_SHA:-}" || "${TAG_SHA}" == 'null' ]]; then
            echo "Failed to resolve SHA for tag ${LATEST_TAG}" >&2
            exit 1
          fi
          tee -a "${GITHUB_ENV}" <<< "TAG_SHA=${TAG_SHA}"
      - name: Sync the major version tag
        run: |
          EXISTING_SHA="$(
            gh api "${REPO_API}/git/matching-refs/tags/${MAJOR_TAG}" \
              --jq ".[] | select(.ref == \"refs/tags/${MAJOR_TAG}\") | .object.sha"
          )"
          EXISTING_SHA="${EXISTING_SHA%%$'\n'*}"
          if [[ -z "${EXISTING_SHA:-}" ]]; then
            gh api "${REPO_API}/git/refs" \
              --method POST --field ref="refs/tags/${MAJOR_TAG}" --field sha="${TAG_SHA}" \
              > /dev/null
            echo "Tagged ${MAJOR_TAG} -> ${TAG_SHA}" >&2
          elif [[ "${EXISTING_SHA}" == "${TAG_SHA}" ]]; then
            echo "${MAJOR_TAG} already points to ${TAG_SHA}" >&2
          else
            gh api "${REPO_API}/git/refs/tags/${MAJOR_TAG}" \
              --method PATCH --field sha="${TAG_SHA}" --field force=true \
              > /dev/null
            echo "Tagged ${MAJOR_TAG} -> ${TAG_SHA}" >&2
          fi
      - name: Sync the minor version tag
        if: inputs.minor-version-tag
        run: |
          EXISTING_SHA="$(
            gh api "${REPO_API}/git/matching-refs/tags/${MINOR_TAG}" \
              --jq ".[] | select(.ref == \"refs/tags/${MINOR_TAG}\") | .object.sha"
          )"
          EXISTING_SHA="${EXISTING_SHA%%$'\n'*}"
          if [[ -z "${EXISTING_SHA:-}" ]]; then
            gh api "${REPO_API}/git/refs" \
              --method POST --field ref="refs/tags/${MINOR_TAG}" --field sha="${TAG_SHA}" \
              > /dev/null
            echo "Tagged ${MINOR_TAG} -> ${TAG_SHA}" >&2
          elif [[ "${EXISTING_SHA}" == "${TAG_SHA}" ]]; then
            echo "${MINOR_TAG} already points to ${TAG_SHA}" >&2
          else
            gh api "${REPO_API}/git/refs/tags/${MINOR_TAG}" \
              --method PATCH --field sha="${TAG_SHA}" --field force=true \
              > /dev/null
            echo "Tagged ${MINOR_TAG} -> ${TAG_SHA}" >&2
          fi
