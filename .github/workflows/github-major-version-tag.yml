---
name: Major version tag on GitHub
on:
  # release:
  #   types:
  #     - released
  workflow_call:
    inputs:
      minor-version-tag:
        required: false
        type: boolean
        description: Create a minor version tag (e.g., v1.1) in addition to the major version tag
        default: false
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
    secrets:
      GH_TOKEN:
        required: false
        description: GitHub token
  workflow_dispatch:  # checkov:skip=CKV_GHA_7:workflow_dispatch is used for manual trigger
    inputs:
      minor-version-tag:
        required: false
        type: boolean
        description: Create a minor version tag (e.g., v1.1) in addition to the major version tag
        default: false
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
permissions:
  contents: write
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  create-major-version-tag:
    runs-on: ${{ inputs.runs-on || 'ubuntu-slim' }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Fetch the latest release tag
        run: |
          LATEST_TAG="$(
            gh release list --repo "${GITHUB_REPOSITORY}" --json tagName,isLatest \
              --jq '.[] | select(.isLatest) | .tagName'
          )"
          echo "LATEST_TAG=${LATEST_TAG}" | tee -a "${GITHUB_ENV}"
      - name: Validate semantic version format
        run: |
          if [[ -z "${LATEST_TAG:-}" ]]; then
            echo 'No latest release found' >&2
            exit 1
          elif [[ ! "${LATEST_TAG}" =~ ^(v?)([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            echo "Not a semantic version tag: ${LATEST_TAG}" >&2
            exit 1
          fi
          TAG_PREFIX="${BASH_REMATCH[1]}"
          MAJOR_VERSION="${BASH_REMATCH[2]}"
          MINOR_VERSION="${BASH_REMATCH[3]}"
          MAJOR_TAG="${TAG_PREFIX}${MAJOR_VERSION}"
          MINOR_TAG="${TAG_PREFIX}${MAJOR_VERSION}.${MINOR_VERSION}"
          echo "MAJOR_TAG=${MAJOR_TAG}" | tee -a "${GITHUB_ENV}"
          echo "MINOR_TAG=${MINOR_TAG}" | tee -a "${GITHUB_ENV}"
      - name: Resolve tag SHA
        run: |
          TAG_REF_ENDPOINT="repos/${GITHUB_REPOSITORY}/git/ref/tags/${LATEST_TAG}"
          OBJECT_TYPE="$(gh api "${TAG_REF_ENDPOINT}" --jq '.object.type')"
          TAG_SHA="$(gh api "${TAG_REF_ENDPOINT}" --jq '.object.sha')"
          if [[ "${OBJECT_TYPE}" == "tag" ]]; then
            TAG_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq '.object.sha')"
          fi
          if [[ -z "${TAG_SHA:-}" || "${TAG_SHA}" == 'null' ]]; then
            echo "Failed to resolve SHA for tag ${LATEST_TAG}" >&2
            exit 1
          fi
          echo "TAG_SHA=${TAG_SHA}" | tee -a "${GITHUB_ENV}"
      - name: Create or update the major version tag
        run: |
          if TAG_REF_RESPONSE="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${MAJOR_TAG}" \
              --include 2>&1
          )"; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${MAJOR_TAG}" \
              --method PATCH --field sha="${TAG_SHA}" --field force=true
          elif grep -qE '^HTTP/[0-9.]+ 404' <<<"${TAG_REF_RESPONSE}"; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              --method POST --field ref="refs/tags/${MAJOR_TAG}" --field sha="${TAG_SHA}"
          else
            echo "${TAG_REF_RESPONSE}" >&2
            exit 1
          fi
          echo "Tagged ${MAJOR_TAG} -> ${TAG_SHA}" >&2
      - name: Create or update the minor version tag
        if: inputs.minor-version-tag
        run: |
          if TAG_REF_RESPONSE="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${MINOR_TAG}" \
              --include 2>&1
          )"; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${MINOR_TAG}" \
              --method PATCH --field sha="${TAG_SHA}" --field force=true
          elif grep -qE '^HTTP/[0-9.]+ 404' <<<"${TAG_REF_RESPONSE}"; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              --method POST --field ref="refs/tags/${MINOR_TAG}" --field sha="${TAG_SHA}"
          else
            echo "${TAG_REF_RESPONSE}" >&2
            exit 1
          fi
          echo "Tagged ${MINOR_TAG} -> ${TAG_SHA}" >&2
