---
name: Pull request review using Claude Code
on:
  workflow_call:
    inputs:
      claude-args:
        required: false
        type: string
        description: Additional arguments to pass directly to Claude Code Action
        default: '--allowedTools "mcp__github_inline_comment__create_inline_comment"'
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
        description: OAuth token for Claude Code
      GH_TOKEN:
        required: false
        description: GitHub token for accessing the repository
#   pull_request:
#     types:
#       - opened
#       - synchronize
permissions:
  contents: read
jobs:
  claude-code-review:
    if: >
      github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          persist-credentials: false
      - name: Deploy agents and commands from Claude Code Action
        run: |
          action_ref="$(sed -n 's#.*anthropics/claude-code-action@\([^[:space:]]*\).*#\1#p' \
            "${GITHUB_WORKSPACE}/.github/workflows/claude-code-review.yml" | head -n 1)"
          action_root="${GITHUB_WORKSPACE}/../../_actions/anthropics/claude-code-action"
          if [[ ! -d "${action_root}" ]]; then
            echo "::error::Could not find claude-code-action under ${action_root}"
            exit 1
          fi
          action_dir="$(find "${action_root}" -mindepth 1 -maxdepth 1 -type d -name "${action_ref}" | head -n 1)"
          if [[ -z "${action_ref}" || -z "${action_dir}" || ! -d "${action_dir}/.claude" ]]; then
            echo "::error::Could not find claude-code-action at pinned ref ${action_ref:-<unknown>}"
            exit 1
          else
            [[ -d .claude/agents ]] || mkdir -p .claude/agents
            [[ -d .claude/commands ]] || mkdir -p .claude/commands
            rsync -av "${action_dir}/.claude/agents/" .claude/agents/
            rsync -av "${action_dir}/.claude/commands/" .claude/commands/
            [[ -f .claude/commands/review-pr.md ]] || exit 1
          fi
      - name: Run PR review with Claude Code
        uses: anthropics/claude-code-action@1fc90f3ed982521116d8ff6d85b948c9b12cae3e  # v1.0.69
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          prompt: '/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}'
          claude_args: ${{ inputs.claude-args }}
