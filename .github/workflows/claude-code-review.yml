---
name: Pull request review using Claude Code
on:
  # pull_request:
  #   types:
  #     - opened
  #     - ready_for_review
  workflow_call:
    inputs:
      claude-args:
        required: false
        type: string
        description: Additional arguments to pass directly to Claude Code Action
        default: '--allowed-tools "Bash(gh:*)",mcp__github_inline_comment__create_inline_comment --model "opusplan"'
      aws-role-to-assume:
        required: false
        type: string
        description: IAM role ARN to assume via GitHub OIDC for Amazon Bedrock access
        default: null
      aws-region:
        required: false
        type: string
        description: AWS region for Bedrock and OIDC credential configuration
        default: us-east-1
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-latest
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
        description: OAuth token for Claude Code
      GH_TOKEN:
        required: false
        description: GitHub token for accessing the repository
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read
jobs:
  claude-code-review:
    if: >
      github.event_name == 'pull_request'
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false
      - name: Deploy agents and commands from claude-code-action
        env:
          CLAUDE_CODE_ACTION_ROOT: ${{ github.workspace }}/../../_actions/anthropics/claude-code-action
        run: |
          if [[ ! -d "${CLAUDE_CODE_ACTION_ROOT}" ]]; then
            echo "::error::claude-code-action not found at expected location: ${CLAUDE_CODE_ACTION_ROOT}"
            exit 1
          else
            claude_dir="$(find "${CLAUDE_CODE_ACTION_ROOT}" -mindepth 2 -maxdepth 2 -type d -name .claude -print -quit)"
            if [[ -z "${claude_dir}" ]]; then
              echo "::error::Could not find .claude under ${CLAUDE_CODE_ACTION_ROOT}"
              exit 1
            else
              install -d "${HOME}/.claude/agents" "${HOME}/.claude/commands"
              rsync -av "${claude_dir}/agents/" "${HOME}/.claude/agents/"
              rsync -av "${claude_dir}/commands/" "${HOME}/.claude/commands/"
            fi
          fi
      - name: Configure AWS credentials
        if: inputs.aws-role-to-assume != null
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ inputs.aws-role-to-assume }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: github-actions-${{ github.run_id }}
      - name: Run PR review with Claude Code
        uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d  # v1.0.157
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_bedrock: ${{ inputs.aws-role-to-assume != null }}
          prompt: '/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}'
          claude_args: ${{ inputs.claude-args }}
          plugins: pr-review-toolkit@claude-plugins-official
          plugin_marketplaces: https://github.com/anthropics/claude-plugins-official.git
