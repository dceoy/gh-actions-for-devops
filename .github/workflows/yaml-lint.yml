---
name: Lint for YAML
on:
  workflow_call:
    inputs:
      search-path:
        required: false
        type: string
        description: Path to search for files
        default: .
      python-version:
        required: false
        type: string
        description: Python version to use
        default: 3.x
      enable-cache:
        required: false
        type: boolean
        description: Cache pinned yamllint downloads
        default: true
      cache-salt:
        required: false
        type: string
        description: Optional value used to bust the yamllint cache
        default: null
      yamllint-config-data:
        required: false
        type: string
        description: Configuration data for yamllint
        default: '{"extends": "relaxed", "rules": {"line-length": "disable"}}'
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    env:
      PIP_NO_CACHE_DIR: ${{ inputs.enable-cache && 'false' || 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Cache yamllint
        if: inputs.enable-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: yamllint-${{ runner.os }}-${{ inputs.python-version }}-1.37.1-${{ inputs.cache-salt }}
      - name: Install yamllint
        run: pip install 'yamllint==1.37.1'
      - name: Execute yamllint
        env:
          YAMLLINT_CONFIG_DATA: ${{ inputs.yamllint-config-data }}
        working-directory: ${{ inputs.search-path }}
        run: >
          git ls-files -z -- '*.yml' '*.yaml'
          | xargs -0 -t yamllint --config-data="${YAMLLINT_CONFIG_DATA}"
