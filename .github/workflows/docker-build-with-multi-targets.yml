---
name: Docker image build and save for multiple build targets
on:
  workflow_call:
    inputs:
      image-name-to-target-stage-json:
        required: true
        type: string
        description: JSON object with image names as keys and target stages as values
      registry:
        required: false
        type: string
        description: Image registry to login (e.g., ghcr.io, docker.io)
        default: null
      registry-user:
        required: false
        type: string
        description: Image registry username
        default: ${{ github.repository_owner }}
      context:
        required: false
        type: string
        description: Build's context is the set of files located in the specified PATH or URL
        default: .
      file:
        required: false
        type: string
        description: Path to a Dockerfile
        default: Dockerfile
      platforms:
        required: false
        type: string
        description: List of target platforms for build
        default: linux/amd64,linux/arm64
      build-args:
        required: false
        type: string
        description: List of build-time variables
        default: null
      secret-envs:
        required: false
        type: string
        description: List of secret env vars to expose to the build (e.g., key=envname, MY_SECRET=MY_ENV_VAR)
        default: null
      secret-files:
        required: false
        type: string
        description: List of secret files to expose to the build (e.g., key=filename, MY_SECRET=./secret.txt)
        default: null
      provenance:
        required: false
        type: boolean
        description: Generate provenance attestation for the build
        default: false
      cosign:
        required: false
        type: boolean
        description: Sign the image with cosign
        default: false
      push:
        required: false
        type: boolean
        description: Push an image to the registry
        default: true
      scan-before-build:
        required: false
        type: boolean
        description: Scan Dockerfile before build
        default: true
      scan-after-build:
        required: false
        type: boolean
        description: Scan the image after build
        default: true
      hadolint-failure-threshold:
        required: false
        type: string
        description: Hadolint failure threshold
        default: error
      hadolint-recursive:
        required: false
        type: boolean
        description: Search for Dockerfile recursively from the project root
        default: true
      trivy-scanners:
        required: false
        type: string
        description: List of scanners to use
        default: vuln,secret,misconfig
      trivy-severity:
        required: false
        type: string
        description: Severity levels to fail the scan
        default: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
      trivy-ignore-unfixed:
        required: false
        type: boolean
        description: Ignore unpatched/unfixed vulnerabilities
        default: true
      trivy-filesystem-exit-code:
        required: false
        type: number
        description: Exit code for trivy filesystem
        default: 1
      trivy-image-exit-code:
        required: false
        type: number
        description: Exit code for trivy image
        default: 0
      trivy-config:
        required: false
        type: string
        description: Path to a Trivy config file
        default: null
      trivy-timeout:
        required: false
        type: string
        description: Timeout for the Trivy scan
        default: 5m0s
      docker-metadata-action-tags:
        required: false
        type: string
        description: Tags for the Docker metadata action
        default: |
          type=sha
          type=sha,format=long
          type=raw,value=latest
          type=schedule
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
      image-artifact-name:
        required: false
        type: string
        description: Image tarball artifact name to upload
        default: docker-image
      image-artifact-retention-days:
        required: false
        type: number
        description: Number of days to retain artifacts
        default: 1
      image-artifact-overwrite:
        required: false
        type: boolean
        description: Overwrite existing artifacts
        default: true
      runs-on:
        required: false
        type: string
        description: GitHub Actions runner to use
        default: ubuntu-latest
      timeout-minutes:
        required: false
        type: number
        description: Timeout in minutes for the job
        default: 360
    secrets:
      BUILD_SECRETS:
        required: false
        description: BuildKit secret values (e.g., GIT_AUTH_TOKEN=mytoken); pass via workflow_call secrets so values are masked
      DOCKER_TOKEN:
        required: false
        description: Registry token
      GH_TOKEN:
        required: false
        description: GitHub token
    outputs:
      target-matrix-json:
        description: JSON array of image name and target stage matrix entries
        value: ${{ jobs.create-target-matrix.outputs.target-matrix-json }}
      image-refs-json:
        description: JSON array of primary Docker image references
        value: ${{ jobs.collect-outputs.outputs.image-refs-json }}
      build-push-digests-json:
        description: JSON array of Docker image digests
        value: ${{ jobs.collect-outputs.outputs.build-push-digests-json }}
permissions:
  contents: write
  packages: write
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  create-target-matrix:
    runs-on: ubuntu-slim
    outputs:
      target-matrix-json: ${{ steps.create-target-matrix.outputs.target_matrix_json }}
    steps:
      - name: Create the target matrix
        id: create-target-matrix
        env:
          IMAGE_NAME_TO_TARGET_STAGE_JSON: ${{ inputs.image-name-to-target-stage-json }}
        run: |
          {
            echo 'target_matrix_json<<EOF'
            jq -c 'to_entries | map(. + {artifact: ((.key + "-" + (.value | tostring)) | gsub("[^A-Za-z0-9_.-]"; "-"))})' \
              <<< "${IMAGE_NAME_TO_TARGET_STAGE_JSON}"
            echo EOF
          } | tee -a "${GITHUB_OUTPUT}"
  build-and-push:
    needs:
      - create-target-matrix
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image-to-target: ${{ fromJSON(needs.create-target-matrix.outputs.target-matrix-json) }}
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      registry: ${{ inputs.registry }}
      registry-user: ${{ inputs.registry-user }}
      image-name: ${{ matrix.image-to-target.key }}
      context: ${{ inputs.context }}
      file: ${{ inputs.file }}
      platforms: ${{ inputs.platforms }}
      target: ${{ matrix.image-to-target.value }}
      build-args: ${{ inputs.build-args }}
      secret-envs: ${{ inputs.secret-envs }}
      secret-files: ${{ inputs.secret-files }}
      provenance: ${{ inputs.provenance }}
      push: ${{ inputs.push }}
      cosign: ${{ inputs.cosign }}
      scan-before-build: ${{ inputs.scan-before-build }}
      scan-after-build: ${{ inputs.scan-after-build }}
      hadolint-failure-threshold: ${{ inputs.hadolint-failure-threshold }}
      hadolint-recursive: ${{ inputs.hadolint-recursive }}
      trivy-scanners: ${{ inputs.trivy-scanners }}
      trivy-severity: ${{ inputs.trivy-severity }}
      trivy-ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}
      trivy-filesystem-exit-code: ${{ inputs.trivy-filesystem-exit-code }}
      trivy-image-exit-code: ${{ inputs.trivy-image-exit-code }}
      trivy-config: ${{ inputs.trivy-config }}
      trivy-timeout: ${{ inputs.trivy-timeout }}
      docker-metadata-action-tags: ${{ inputs.docker-metadata-action-tags }}
      image-artifact-name: ${{ format('{0}-{1}', inputs.image-artifact-name, matrix.image-to-target.artifact) }}
      image-artifact-retention-days: ${{ inputs.image-artifact-retention-days }}
      image-artifact-overwrite: ${{ inputs.image-artifact-overwrite }}
      runs-on: ${{ inputs.runs-on }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
    secrets:
      BUILD_SECRETS: ${{ secrets.BUILD_SECRETS }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
  collect-outputs:
    needs:
      - build-and-push
    runs-on: ubuntu-slim
    outputs:
      image-refs-json: ${{ steps.outputs.outputs.image_refs_json }}
      build-push-digests-json: ${{ steps.outputs.outputs.build_push_digests_json }}
    steps:
      - name: Collect matrix outputs
        id: outputs
        env:
          BUILD_AND_PUSH_OUTPUTS_JSON: ${{ toJSON(needs.build-and-push.outputs) }}
        run: |
          {
            echo 'image_refs_json<<EOF'
            jq -c '[.["image-ref"] // empty]' <<< "${BUILD_AND_PUSH_OUTPUTS_JSON}"
            echo EOF
            echo 'build_push_digests_json<<EOF'
            jq -c '[.["build-push-digest"] // empty]' <<< "${BUILD_AND_PUSH_OUTPUTS_JSON}"
            echo EOF
          } | tee -a "${GITHUB_OUTPUT}"
