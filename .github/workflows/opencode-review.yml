---
name: Pull request review using OpenCode
on:
  # pull_request:
  #   types:
  #     - opened
  #     - ready_for_review
  workflow_call:
    inputs:
      model:
        required: false
        type: string
        description: Model to use with opencode
        default: opencode-go/glm-5.2
      agent:
        required: false
        type: string
        description: Primary agent to use (falls back to default_agent or 'build')
        default: null
      share:
        required: false
        type: string
        description: Share the opencode session
        default: false
      prompt:
        required: false
        type: string
        description: Prompt to override the default, which runs this repo's /review-pr workflow
        default: /review-pr
      use-github-token:
        required: false
        type: boolean
        description: Use GITHUB_TOKEN directly instead of OpenCode App token exchange
        default: false
      mentions:
        required: false
        type: string
        description: Comma-separated list of trigger phrases (case-insensitive)
        default: /opencode,/oc
      variant:
        required: false
        type: string
        description: Model variant for provider-specific reasoning effort (e.g., high, max, minimal)
        default: max
      oidc-base-url:
        required: false
        type: string
        description: Base URL for OIDC token exchange API
        default: null
      version:
        required: false
        type: string
        description: OpenCode version to install (e.g., v1.2.3)
        default: latest
      enable-toolkit:
        required: false
        type: boolean
        description: Install the action's bundled .opencode/ agents, commands, and skills into global config before running
        default: true
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-latest
    secrets:
      OPENCODE_API_KEY:
        required: false
        description: API key for opencode
      GH_TOKEN:
        required: false
        description: GitHub token for accessing the repository
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read
jobs:
  opencode-review:
    if: >
      github.event_name == 'pull_request'
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          persist-credentials: false
      - name: Run OpenCode
        uses: dceoy/opencode-action@5b245d742d3395380d438feabf56caed2a3d7d13  # v0.2.1
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
        with:
          model: ${{ inputs.model }}
          agent: ${{ inputs.agent }}
          share: ${{ inputs.share }}
          prompt: ${{ inputs.prompt }}
          use-github-token: ${{ inputs.use-github-token }}
          mentions: ${{ inputs.mentions }}
          variant: ${{ inputs.variant }}
          oidc-base-url: ${{ inputs.oidc-base-url }}
          version: ${{ inputs.version }}
          enable-toolkit: ${{ inputs.enable-toolkit }}
