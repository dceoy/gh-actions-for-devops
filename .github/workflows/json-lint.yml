---
name: Lint for JSON
on:
  workflow_call:
    inputs:
      search-path:
        required: false
        type: string
        description: Path to search for files
        default: .
      package-path:
        required: false
        type: string
        description: Path containing an optional package.json and lockfile
        default: .
      node-version:
        required: false
        type: string
        description: Node.js version to use
        default: latest
      enable-cache:
        required: false
        type: boolean
        description: Cache the pinned jsonlint tool download
        default: true
      cache-dependency-path:
        required: false
        type: string
        description: Lockfile used to scope a package-manager cache
        default: null
      cache-salt:
        required: false
        type: string
        description: Optional value used to bust the jsonlint cache
        default: null
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Detect the package manager
        working-directory: ${{ inputs.package-path }}
        run: |
          if [[ -f package-lock.json ]]; then
            echo 'PACKAGE_MANAGER=npm' >> "${GITHUB_ENV}"
            echo 'PACKAGE_LOCK_FILE=package-lock.json' >> "${GITHUB_ENV}"
          elif [[ -f pnpm-lock.yaml ]]; then
            echo 'PACKAGE_MANAGER=pnpm' >> "${GITHUB_ENV}"
            echo 'PACKAGE_LOCK_FILE=pnpm-lock.yaml' >> "${GITHUB_ENV}"
          elif [[ -f yarn.lock ]]; then
            echo 'yarn.lock is not supported. Use package-lock.json or pnpm-lock.yaml.' >&2
            exit 1
          fi
      - name: Setup pnpm before cache setup
        if: inputs.enable-cache && env.PACKAGE_MANAGER == 'pnpm'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: latest
      - name: Setup Node.js with package-manager cache
        if: inputs.enable-cache && env.PACKAGE_MANAGER != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ env.PACKAGE_MANAGER }}
          cache-dependency-path: ${{ inputs.cache-dependency-path || format('{0}/{1}', inputs.package-path, env.PACKAGE_LOCK_FILE) }}
      - name: Setup Node.js without package-manager cache
        if: '! inputs.enable-cache || env.PACKAGE_MANAGER == '''''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Cache jsonlint
        if: inputs.enable-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/gh-actions-for-devops/jsonlint
          key: jsonlint-${{ runner.os }}-${{ inputs.node-version }}-1.6.3-${{ inputs.cache-salt }}
      - name: Install jsonlint
        run: | # zizmor: ignore[adhoc-packages] installs pinned jsonlint tool
          tool_dir="${HOME}/.cache/gh-actions-for-devops/jsonlint"
          if [[ ! -x "${tool_dir}/node_modules/.bin/jsonlint" ]]; then
            npm install --prefix "${tool_dir}" 'jsonlint@1.6.3'
          fi
          echo "${tool_dir}/node_modules/.bin" >> "${GITHUB_PATH}"
      - name: Execute jsonlint
        working-directory: ${{ inputs.search-path }}
        run: >
          git ls-files -z -- '*.json' | xargs -0 -t jsonlint --quiet
