---
name: Deletion of merged branches on GitHub
on:
  # pull_request:
  #   branches:
  #     - main
  #   types:
  #     - closed
  workflow_call:
    inputs:
      pull-request-number:
        required: false
        type: string
        description: The pull request number to delete the branch for
        default: null
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
    secrets:
      GH_TOKEN:
        required: false
        description: GitHub token
permissions:
  contents: write
  pull-requests: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  delete-merged-branch:
    if: >
      inputs.pull-request-number != null || github.event.pull_request.merged
    runs-on: ${{ inputs.runs-on }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
      PR_NUMBER: ${{ inputs.pull-request-number || github.event.pull_request.number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Validate the merged branch is safe to delete
        id: validate-branch
        run: |
          if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid pull request number '${PR_NUMBER}'"
            exit 1
          fi

          pr_json="$(gh pr view "${PR_NUMBER}" \
            --json baseRefName,headRefName,headRepositoryOwner,isCrossRepository,mergedAt,state)"
          state="$(jq -r '.state' <<< "${pr_json}")"
          merged_at="$(jq -r '.mergedAt // ""' <<< "${pr_json}")"
          head_ref="$(jq -r '.headRefName' <<< "${pr_json}")"
          base_ref="$(jq -r '.baseRefName' <<< "${pr_json}")"
          head_owner="$(jq -r '.headRepositoryOwner.login // ""' <<< "${pr_json}")"
          is_cross_repository="$(jq -r '.isCrossRepository' <<< "${pr_json}")"
          repository_owner="${GITHUB_REPOSITORY%%/*}"
          default_branch="$(gh repo view "${GITHUB_REPOSITORY}" --json defaultBranchRef --jq '.defaultBranchRef.name')"

          if [[ "${state}" != "MERGED" || -z "${merged_at}" ]]; then
            echo "::error::Pull request ${PR_NUMBER} is not merged"
            exit 1
          elif [[ "${is_cross_repository}" == "true" || "${head_owner}" != "${repository_owner}" ]]; then
            echo "::notice::Skipping deletion for fork or external head repository branch '${head_ref}'"
            echo "delete_branch=false" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          elif [[ -z "${head_ref}" || "${head_ref}" == "${default_branch}" || "${head_ref}" == "${base_ref}" ]]; then
            echo "::error::Refusing to delete default/base branch '${head_ref}'"
            exit 1
          fi
          git check-ref-format "refs/heads/${head_ref}" >/dev/null

          open_pr_count="$(gh pr list --state open --json headRefName,headRepositoryOwner,number \
            | jq -r \
                --arg head_ref "${head_ref}" \
                --arg head_owner "${head_owner}" \
                --argjson pr_number "${PR_NUMBER}" \
                '[.[] | select(
                  .number != $pr_number
                  and .headRefName == $head_ref
                  and (.headRepositoryOwner.login // "") == $head_owner
                )] | length')"
          if [[ "${open_pr_count}" != "0" ]]; then
            echo "::error::Refusing to delete '${head_ref}' because it is used by another open PR"
            exit 1
          fi

          encoded_branch="$(jq -nr --arg branch "${head_ref}" '$branch | @uri')"
          protected="$(gh api "repos/${GITHUB_REPOSITORY}/branches/${encoded_branch}" --jq '.protected')"
          if [[ "${protected}" == "true" ]]; then
            echo "::error::Refusing to delete protected branch '${head_ref}'"
            exit 1
          fi

          echo "delete_branch=true" | tee -a "${GITHUB_OUTPUT}"
          echo "head_ref=${head_ref}" | tee -a "${GITHUB_OUTPUT}"
      - name: Delete the merged branch
        if: steps.validate-branch.outputs.delete_branch == 'true'
        env:
          HEAD_REF: ${{ steps.validate-branch.outputs.head_ref }}
        run: >
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: bearer ${GH_TOKEN}"
          push origin --delete "${HEAD_REF}"
