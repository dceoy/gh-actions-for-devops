---
name: Pull request review using Gemini CLI
on:
  workflow_call:
    inputs:
      additional-context:
        required: false
        type: string
        description: Additional context passed to the Gemini review prompt
        default: null
      gemini-cli-version:
        required: false
        type: string
        description: Gemini CLI version (latest, preview, nightly, version number, or git ref)
        default: latest
      gemini-debug:
        required: false
        type: boolean
        description: Whether to enable Gemini CLI debug logging
        default: false
      gemini-model:
        required: false
        type: string
        description: Model to use with Gemini
        default: gemini-3-flash-preview
      prompt:
        required: false
        type: string
        description: Prompt to pass to Gemini CLI
        default: /pr-code-review
      settings:
        required: false
        type: string
        description: >-
          JSON string for .gemini/settings.json configuration.
          If not provided, a default configuration for PR review is used.
        default: null
      extensions:
        required: false
        type: string
        description: JSON array of Gemini CLI extensions to install
        default: '["https://github.com/gemini-cli-extensions/code-review"]'
      use-vertex-ai:
        required: false
        type: boolean
        description: Whether to use Vertex AI for Gemini model access
        default: false
      use-gemini-code-assist:
        required: false
        type: boolean
        description: Whether to use Code Assist for Gemini model access
        default: false
      upload-artifacts:
        required: false
        type: boolean
        description: Whether to upload artifacts to GitHub Actions
        default: false
      gcp-project-id:
        required: false
        type: string
        description: Google Cloud project ID
        default: null
      gcp-location:
        required: false
        type: string
        description: Google Cloud location
        default: null
      gcp-service-account:
        required: false
        type: string
        description: Google Cloud service account email
        default: null
      gcp-workload-identity-provider:
        required: false
        type: string
        description: Google Cloud Workload Identity Provider
        default: null
      github-mcp-server-version:
        required: false
        type: string
        description: Version tag of ghcr.io/github/github-mcp-server
        default: v0.27.0
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-latest
    secrets:
      GEMINI_API_KEY:
        required: false
        description: Gemini API key
      GOOGLE_API_KEY:
        required: false
        description: Vertex AI API key
      GH_TOKEN:
        required: false
        description: GitHub token for accessing the repository
permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
concurrency:
  group: >-
    ${{ github.workflow }}-review-${{ github.event_name }}-${{
    github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  gemini-cli-review:
    if: >
      github.event_name == 'pull_request'
      || (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN || github.token }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          persist-credentials: false
      - name: Generate default settings
        id: default-settings
        if: inputs.settings == null
        env:
          GEMINI_MODEL: ${{ inputs.gemini-model }}
          GITHUB_MCP_SERVER_VERSION: ${{ inputs.github-mcp-server-version }}
        run: |
          jq -cn \
            --arg gemini_model "${GEMINI_MODEL}" \
            --arg github_mcp_server_version "${GITHUB_MCP_SERVER_VERSION}" \
            '{
              model: {
                name: $gemini_model,
                maxSessionTurns: 25
              },
              telemetry: {
                enabled: true,
                target: "local",
                outfile: ".gemini/telemetry.log"
              },
              mcpServers: {
                github: {
                  command: "docker",
                  args: [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:\($github_mcp_server_version)"
                  ],
                  includeTools: [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  env: {
                    GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
                  }
                }
              },
              tools: {
                core: [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }' \
            | {
              echo 'json<<EOF'
              cat
              echo 'EOF'
            } >> "${GITHUB_OUTPUT}"
      - name: Run Gemini CLI pull request review
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489  # v0.1.22
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN || github.token }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          ISSUE_TITLE: >-
            ${{ github.event.pull_request.title
            || github.event.issue.title }}
          ISSUE_BODY: >-
            ${{ github.event.pull_request.body
            || github.event.issue.body }}
          PULL_REQUEST_NUMBER: >-
            ${{ github.event.pull_request.number
            || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          ADDITIONAL_CONTEXT: ${{ inputs.additional-context }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          gemini_cli_version: ${{ inputs.gemini-cli-version }}
          gemini_debug: ${{ inputs.gemini-debug }}
          gemini_model: ${{ inputs.gemini-model }}
          use_vertex_ai: ${{ inputs.use-vertex-ai }}
          use_gemini_code_assist: ${{ inputs.use-gemini-code-assist }}
          upload_artifacts: ${{ inputs.upload-artifacts }}
          gcp_project_id: ${{ inputs.gcp-project-id }}
          gcp_location: ${{ inputs.gcp-location }}
          gcp_service_account: ${{ inputs.gcp-service-account }}
          gcp_workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
          workflow_name: gemini-cli-review
          settings: >-
            ${{ inputs.settings
            || steps.default-settings.outputs.json }}
          extensions: ${{ inputs.extensions }}
          prompt: ${{ inputs.prompt }}
