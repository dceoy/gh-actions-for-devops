---
name: AI agents
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - ready_for_review
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted
  issues:
    types:
      - opened
      - assigned
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  claude-code-review:
    if: >
      github.event_name == 'pull_request'
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
      && (! github.event.pull_request.draft)
      && (! startsWith(github.head_ref, 'dependabot/'))
      && (! startsWith(github.head_ref, 'renovate/'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: ./.github/workflows/claude-code-review.yml
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  claude-code-bot:
    if: >
      (
        github.event_name == 'issue_comment'
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        && contains(github.event.comment.body, '@claude')
      ) || (
        github.event_name == 'pull_request_review_comment'
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        && contains(github.event.comment.body, '@claude')
      ) || (
        github.event_name == 'pull_request_review'
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
        && contains(github.event.review.body, '@claude')
      ) || (
        github.event_name == 'issues'
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
        && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))
      )
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: ./.github/workflows/claude-code-bot.yml
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  opencode-review:
    if: >
      github.event_name == 'pull_request'
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
      && (! github.event.pull_request.draft)
      && (! startsWith(github.head_ref, 'dependabot/'))
      && (! startsWith(github.head_ref, 'renovate/'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: ./.github/workflows/opencode-review.yml
    secrets:
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  opencode-bot:
    if: >
      (
        (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        && (contains(github.event.comment.body, ' /oc') || contains(github.event.comment.body, ' /opencode'))
      ) || (
        github.event_name == 'pull_request_review'
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
        && (contains(github.event.review.body, '/oc') || contains(github.event.review.body, '/opencode'))
      ) || (
        github.event_name == 'issues'
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
        && (
          (contains(github.event.issue.body, '/oc') || contains(github.event.issue.title, '/oc'))
          || (contains(github.event.issue.body, '/opencode') || contains(github.event.issue.title, '/opencode'))
        )
      )
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: ./.github/workflows/opencode-bot.yml
    secrets:
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
