---
name: Dependency cache smoke tests
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  python-nested-path:
    uses: ./.github/workflows/python-package-test.yml
    with:
      package-path: .github/cache-smoke/python
      requirements-txt: requirements.txt
      cache-dependency-path: .github/cache-smoke/python/requirements.txt
  node-nested-path:
    uses: ./.github/workflows/typescript-package-script.yml
    with:
      package-path: .github/cache-smoke/node
      cache-dependency-path: .github/cache-smoke/node/package-lock.json
  simple-linter:
    uses: ./.github/workflows/yaml-lint.yml
    with:
      search-path: .github/cache-smoke
      cache-salt: smoke-v1
