---
name: Build and deployment of MkDocs documentation
on:
  workflow_call:
    inputs:
      package-path:
        required: false
        type: string
        description: Path to a Python package or project
        default: .
      python-version:
        required: false
        type: string
        description: Python version to use (not applicable if uv.lock is present)
        default: 3.x
      uv-version:
        required: false
        type: string
        description: Version of uv to use (applicable only if uv.lock is present)
        default: latest
      mkdocs-config-file:
        required: false
        type: string
        description: MkDocs config file
        default: mkdocs.yml
      mkdocs-strict:
        required: false
        type: boolean
        description: Enable strict mode for MkDocs build
        default: true
      mkdocs-theme:
        required: false
        type: string
        description: Theme to use for MkDocs (mkdocs or readthedocs)
        default: mkdocs
      runs-on:
        required: false
        type: string
        description: GitHub Actions runner to use
        default: ubuntu-latest
    secrets:
      GH_TOKEN:
        required: false
        description: GitHub token
  workflow_dispatch:  # checkov:skip=CKV_GHA_7:workflow_dispatch inputs are required for MkDocs build settings
    inputs:
      package-path:
        required: false
        type: string
        description: Path to a Python package or project
        default: .
      python-version:
        required: false
        type: string
        description: Python version to use (not applicable if uv.lock is present)
        default: 3.x
      uv-version:
        required: false
        type: string
        description: Version of uv to use (applicable only if uv.lock is present)
        default: latest
      mkdocs-config-file:
        required: false
        type: string
        description: MkDocs config file
        default: mkdocs.yml
      mkdocs-strict:
        required: false
        type: boolean
        description: Enable strict mode for MkDocs build
        default: true
      mkdocs-theme:
        required: false
        type: string
        description: Theme to use for MkDocs (mkdocs or readthedocs)
        default: mkdocs
      runs-on:
        required: false
        type: string
        description: GitHub Actions runner to use
        default: ubuntu-latest
permissions:
  contents: write
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  build-and-deploy:
    runs-on: ${{ inputs.runs-on }}
    env:
      MKDOCS_SITE_DIR: ${{ inputs.package-path }}/site
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Detect uv.lock or poetry.lock
        working-directory: ${{ inputs.package-path }}
        run: |
          if [[ -f uv.lock ]]; then
            echo "LOCK_FILE=uv.lock" >> "${GITHUB_ENV}"
          elif [[ -f poetry.lock ]]; then
            echo "LOCK_FILE=poetry.lock" >> "${GITHUB_ENV}"
          else
            echo "LOCK_FILE=" >> "${GITHUB_ENV}"
          fi
      - name: Set up uv
        if: env.LOCK_FILE == 'uv.lock'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}
      - name: Install packages using uv
        if: env.LOCK_FILE == 'uv.lock'
        working-directory: ${{ inputs.package-path }}
        run: |
          uv sync --all-groups
          echo "EXECUTOR_KIND=uv" >> "${GITHUB_ENV}"
      - name: Set up Python
        if: env.LOCK_FILE != 'uv.lock'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install packages
        if: env.LOCK_FILE != 'uv.lock'
        working-directory: ${{ inputs.package-path }}
        run: |
          pip install -U --no-cache-dir pip
          if [[ "${LOCK_FILE}" == "poetry.lock" ]]; then
            pip install --no-cache-dir poetry
            poetry lock --no-interaction
            poetry install --no-interaction --no-root
            echo "EXECUTOR_KIND=poetry" >> "${GITHUB_ENV}"
          else
            pip install -U --no-cache-dir mkdocs
            echo "EXECUTOR_KIND=none" >> "${GITHUB_ENV}"
          fi
      - name: Build MkDocs site
        working-directory: ${{ inputs.package-path }}
        env:
          MKDOCS_CONFIG_FILE: ${{ inputs.mkdocs-config-file }}
          MKDOCS_STRICT: ${{ inputs.mkdocs-strict }}
          MKDOCS_THEME: ${{ inputs.mkdocs-theme }}
        run: |
          args=()
          [[ -n "${MKDOCS_CONFIG_FILE}" ]] && args+=(--config-file="${MKDOCS_CONFIG_FILE}")
          [[ "${MKDOCS_STRICT}" == "true" ]] && args+=(--strict)
          [[ -n "${MKDOCS_THEME}" ]] && args+=(--theme="${MKDOCS_THEME}")
          case "${EXECUTOR_KIND}" in
            uv)     uv run mkdocs build --clean --site-dir="${MKDOCS_SITE_DIR}" "${args[@]}" ;;
            poetry) poetry run mkdocs build --clean --site-dir="${MKDOCS_SITE_DIR}" "${args[@]}" ;;
            *)      mkdocs build --clean --site-dir="${MKDOCS_SITE_DIR}" "${args[@]}" ;;
          esac
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
        with:
          github_token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          publish_dir: ${{ env.MKDOCS_SITE_DIR }}
