---
name: Upgrade of Terraform lock files and pull request merge
on:
  workflow_call:
    inputs:
      terraform-working-directories:
        required: false
        type: string
        description: Terraform working directories (separated by spaces or returns)
        default: .
      terraform-working-directory-to-version-tf-json:
        required: false
        type: string
        description: JSON object with Terraform working directories as keys and Terraform version files as values
        default: null
      terragrunt-working-directories:
        required: false
        type: string
        description: Terragrunt working directories (separated by spaces or returns)
        default: null
      terraform-version:
        required: false
        type: string
        description: Terraform version to use
        default: latest
      terragrunt-version:
        required: false
        type: string
        description: Terragrunt version to use
        default: latest
      merged-pr-branch-prefix:
        required: false
        type: string
        description: Prefix of the branches to merge (e.g., dependabot/terraform/)
        default: null
      merge-pr-head-branch-prefix:
        required: false
        type: string
        description: Prefix required for lock-file PR branches before approval or merge
        default: github-actions/
      merge-pr-author-allowlist:
        required: false
        type: string
        description: Comma-separated trusted PR authors allowed for approval or merge
        default: github-actions[bot]
      search-path-for-lint-and-scan:
        required: false
        type: string
        description: Path to search for files to lint and scan
        default: .
      use-tflint:
        required: false
        type: boolean
        description: Use TFLint linter
        default: true
      use-trivy:
        required: false
        type: boolean
        description: Use Trivy vulnerability scanner
        default: true
      trivy-scanners:
        required: false
        type: string
        description: List of scanners to use
        default: vuln,secret,misconfig
      trivy-severity:
        required: false
        type: string
        description: Severity levels to fail the scan
        default: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
      trivy-ignore-unfixed:
        required: false
        type: boolean
        description: Ignore unpatched/unfixed vulnerabilities
        default: true
      trivy-exit-code:
        required: false
        type: number
        description: Exit code for pre-build scan
        default: 1
      trivy-config:
        required: false
        type: string
        description: Path to a Trivy config file
        default: null
      trivy-timeout:
        required: false
        type: string
        description: Timeout for the Trivy scan
        default: 5m0s
      merge-pr:
        required: false
        type: boolean
        description: Whether to merge the pull request
        default: true
      runs-on:
        required: false
        type: string
        description: GitHub Actions runner to use
        default: ubuntu-latest
    secrets:
      GH_TOKEN:
        required: false
        description: >-
          GitHub token. Use a dedicated PAT or GitHub App token if branch
          protection requires PR approval; the default GITHUB_TOKEN cannot
          approve PRs created by the same token.
permissions:
  contents: read
  pull-requests: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  branch-merge:
    if: >
      inputs.merged-pr-branch-prefix != null && github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: read
    uses: ./.github/workflows/github-pr-branch-aggregation.yml
    with:
      branch-prefix: ${{ inputs.merged-pr-branch-prefix }}
      delete-merged-branch: false
      runs-on: ubuntu-slim
  terraform-lock-files-upgrade:
    if: >
      (! (failure() || cancelled()))
    needs:
      - branch-merge
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/terraform-lock-files-upgrade.yml
    with:
      terraform-working-directories: ${{ inputs.terraform-working-directories }}
      terraform-working-directory-to-version-tf-json: ${{ inputs.terraform-working-directory-to-version-tf-json }}
      terragrunt-working-directories: ${{ inputs.terragrunt-working-directories }}
      terraform-version: ${{ inputs.terraform-version }}
      terragrunt-version: ${{ inputs.terragrunt-version }}
      create-pr: false
      runs-on: ${{ inputs.runs-on }}
  terraform-lint-and-scan:
    needs:
      - terraform-lock-files-upgrade
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/terraform-lint-and-scan.yml
    with:
      search-path: ${{ inputs.search-path-for-lint-and-scan }}
      terraform-version: ${{ inputs.terraform-version }}
      terragrunt-version: ${{ inputs.terragrunt-version }}
      terraform-validate: false
      use-tflint: ${{ inputs.use-tflint }}
      use-trivy: ${{ inputs.use-trivy }}
      trivy-scanners: ${{ inputs.trivy-scanners }}
      trivy-severity: ${{ inputs.trivy-severity }}
      trivy-ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}
      trivy-exit-code: ${{ inputs.trivy-exit-code }}
      trivy-config: ${{ inputs.trivy-config }}
      trivy-timeout: ${{ inputs.trivy-timeout }}
      runs-on: ${{ inputs.runs-on }}
  pr-merge:
    if: >
      github.event_name == 'pull_request'
      && inputs.merge-pr
      && inputs.merge-pr-author-allowlist != null
      && inputs.merge-pr-author-allowlist != ''
      && github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - terraform-lint-and-scan
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-slim
    env:
      EXPECTED_HEAD_BRANCH_PREFIX: ${{ inputs.merge-pr-head-branch-prefix }}
      MERGE_PR_AUTHOR_ALLOWLIST: ${{ inputs.merge-pr-author-allowlist }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
    steps:
      - name: Validate automation pull request
        run: |
          if [[ -z "${EXPECTED_HEAD_BRANCH_PREFIX}" ]]; then
            echo "::error::merge-pr-head-branch-prefix must not be empty"
            exit 1
          elif [[ "${PR_HEAD_REF}" != "${EXPECTED_HEAD_BRANCH_PREFIX}"* ]]; then
            echo "::error::Pull request branch '${PR_HEAD_REF}' does not match '${EXPECTED_HEAD_BRANCH_PREFIX}'"
            exit 1
          elif [[ "${PR_HEAD_REPOSITORY}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "::error::Pull request head repository '${PR_HEAD_REPOSITORY}' is not '${GITHUB_REPOSITORY}'"
            exit 1
          elif [[ -z "${MERGE_PR_AUTHOR_ALLOWLIST}" ]]; then
            echo "::error::merge-pr-author-allowlist must not be empty when merge-pr is true"
            exit 1
          fi

          allowed=false
          IFS=',' read -r -a allowed_authors <<< "${MERGE_PR_AUTHOR_ALLOWLIST}"
          for author in "${allowed_authors[@]}"; do
            author="${author#"${author%%[![:space:]]*}"}"
            author="${author%"${author##*[![:space:]]}"}"
            if [[ "${PR_AUTHOR}" == "${author}" ]]; then
              allowed=true
              break
            fi
          done
          if [[ "${allowed}" != true ]]; then
            echo "::error::Pull request author '${PR_AUTHOR}' is not in merge-pr-author-allowlist"
            exit 1
          fi
      - name: Verify the pull request only changes Terraform lock files
        run: |
          changed_files="$(mktemp)"
          gh pr diff "${PR_URL}" --name-only > "${changed_files}"
          if [[ ! -s "${changed_files}" ]]; then
            echo "::error::Pull request diff is empty"
            exit 1
          fi
          while IFS= read -r path; do
            if [[ "${path}" != ".terraform.lock.hcl" && "${path}" != */.terraform.lock.hcl ]]; then
              echo "::error::Unexpected file in lock-file pull request: ${path}"
              exit 1
            fi
          done < "${changed_files}"
      - name: Approve the pull request when the token can approve
        continue-on-error: true
        run: >
          gh pr review --approve "${PR_URL}"
      - name: Merge the pull request
        run: >
          gh pr merge --merge --delete-branch "${PR_URL}"
