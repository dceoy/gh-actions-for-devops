---
name: Lint and security scan for GitHub Actions workflows
on:
  workflow_call:
    inputs:
      search-path:
        required: false
        type: string
        description: Path to search for files
        default: .github/workflows
      go-version:
        required: false
        type: string
        description: Go version to use
        default: stable
      python-version:
        required: false
        type: string
        description: Python version to use
        default: 3.x
      enable-cache:
        required: false
        type: boolean
        description: Cache pinned linter and Python tool downloads
        default: true
      cache-salt:
        required: false
        type: string
        description: Optional value used to bust tool caches
        default: null
      use-shellcheck:
        required: false
        type: boolean
        description: Whether to use ShellCheck
        default: true
      use-pyflakes:
        required: false
        type: boolean
        description: Whether to use pyflakes
        default: true
      use-yamllint:
        required: false
        type: boolean
        description: Whether to use yamllint
        default: true
      yamllint-config-data:
        required: false
        type: string
        description: Configuration data for yamllint
        default: '{"extends": "relaxed", "rules": {"line-length": "disable"}}'
      use-zizmor:
        required: false
        type: boolean
        description: Whether to use Zizmor for security auditing
        default: true
      zizmor-online-audits:
        required: false
        type: boolean
        description: Whether to run Zizmor online audits
        default: true
      zizmor-persona:
        required: false
        type: string
        description: Auditing persona for Zizmor (regular, pedantic, auditor)
        default: regular
      zizmor-min-severity:
        required: false
        type: string
        description: Minimum severity threshold (unknown, informational, low, medium, high)
        default: null
      zizmor-min-confidence:
        required: false
        type: string
        description: Minimum confidence threshold (unknown, low, medium, high)
        default: null
      zizmor-advanced-security:
        required: false
        type: boolean
        description: Whether to enable GitHub Advanced Security instead of GitHub annotations for Zizmor's results
        default: true
      zizmor-config:
        required: false
        type: string
        description: Path to a Zizmor configuration file
        default: null
      use-checkov:
        required: false
        type: boolean
        description: Use Checkov to scan GitHub Actions workflows
        default: true
      checkov-framework:
        required: false
        type: string
        description: Checkov frameworks to scan
        default: github_actions,github_configuration
      checkov-skip-framework:
        required: false
        type: string
        description: Checkov frameworks to skip
        default: null
      checkov-check:
        required: false
        type: string
        description: Checkov checks to include
        default: null
      checkov-skip-check:
        required: false
        type: string
        description: Checkov checks to skip
        default: null
      checkov-config-file:
        required: false
        type: string
        description: Path to a Checkov config file
        default: null
      checkov-output-format:
        required: false
        type: string
        description: Checkov output formats
        default: github_failed_only
      checkov-output-file-path:
        required: false
        type: string
        description: Checkov output file path(s)
        default: null
      checkov-soft-fail:
        required: false
        type: boolean
        description: Always return exit code 0 from Checkov
        default: false
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-latest
    secrets:
      GH_TOKEN:
        required: false
        description: GitHub token
      BC_API_KEY:
        required: false
        description: Bridgecrew or Prisma Cloud API key
permissions:
  contents: read
  security-events: write
  actions: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  github-actions-lint-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Disable pip cache
        if: '! inputs.enable-cache'
        run: echo 'PIP_NO_CACHE_DIR=true' >> "${GITHUB_ENV}"
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Cache actionlint and ShellCheck
        if: inputs.enable-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.local/bin
          key: gha-linters-${{ runner.os }}-${{ runner.arch }}-actionlint-1.7.7-shellcheck-0.10.0-${{ inputs.cache-salt }}
      - name: Install actionlint
        run: |
          mkdir -p "${HOME}/.local/bin"
          if [[ ! -x "${HOME}/.local/bin/actionlint" ]]; then
            arch=amd64
            [[ "${RUNNER_ARCH}" == "ARM64" ]] && arch=arm64
            curl --fail --location --silent --show-error \
              "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_${arch}.tar.gz" \
              | tar -xz -C "${HOME}/.local/bin" actionlint
          fi
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - name: Install ShellCheck when unavailable
        if: inputs.use-shellcheck
        run: |
          if command -v shellcheck >/dev/null; then
            exit 0
          fi
          if [[ ! -x "${HOME}/.local/bin/shellcheck" ]]; then
            arch=x86_64
            [[ "${RUNNER_ARCH}" == "ARM64" ]] && arch=aarch64
            curl --fail --location --silent --show-error \
              "https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.${arch}.tar.xz" \
              | tar -xJ --strip-components=1 -C "${RUNNER_TEMP}" "shellcheck-v0.10.0/shellcheck"
            install -m 0755 "${RUNNER_TEMP}/shellcheck" "${HOME}/.local/bin/shellcheck"
          fi
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Cache Python linter downloads
        if: inputs.enable-cache && inputs.use-pyflakes
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/pip
          key: gha-python-linters-${{ runner.os }}-${{ inputs.python-version }}-pyflakes-3.4.0-${{ inputs.cache-salt }}
      - name: Install pyflakes
        if: inputs.use-pyflakes
        run: >
          pip install 'pyflakes==3.4.0'
      - name: Execute actionlint
        env:
          SEARCH_PATH: ${{ inputs.search-path }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("${SEARCH_PATH}/${file}")
          done < <(git -C "${SEARCH_PATH}" ls-files -z -- '*.yml' '*.yaml')
          if ((${#files[@]} == 0)); then
            echo "No GitHub Actions workflow YAML files found under ${SEARCH_PATH}; skipping actionlint."
            exit 0
          fi
          actionlint "${files[@]}"
      - name: Run zizmor
        if: inputs.use-zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa  # v0.5.7
        with:
          inputs: ${{ inputs.search-path }}
          online-audits: ${{ inputs.zizmor-online-audits }}
          persona: ${{ inputs.zizmor-persona }}
          min-severity: ${{ inputs.zizmor-min-severity }}
          min-confidence: ${{ inputs.zizmor-min-confidence }}
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          advanced-security: ${{ inputs.zizmor-advanced-security }}
          annotations: ${{ ! inputs.zizmor-advanced-security }}
          config: ${{ inputs.zizmor-config }}
      - name: Run Checkov
        if: inputs.use-checkov
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff  # v12.3107.0
        with:
          directory: ${{ inputs.search-path }}
          framework: ${{ inputs.checkov-framework }}
          skip_framework: ${{ inputs.checkov-skip-framework }}
          check: ${{ inputs.checkov-check }}
          skip_check: ${{ inputs.checkov-skip-check }}
          config_file: ${{ inputs.checkov-config-file }}
          output_format: ${{ inputs.checkov-output-format }}
          output_file_path: ${{ inputs.checkov-output-file-path }}
          soft_fail: ${{ inputs.checkov-soft-fail }}
          api-key: ${{ secrets.BC_API_KEY }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
  yaml-lint:
    if: inputs.use-yamllint
    uses: ./.github/workflows/yaml-lint.yml
    with:
      search-path: ${{ inputs.search-path }}
      python-version: ${{ inputs.python-version }}
      yamllint-config-data: ${{ inputs.yamllint-config-data }}
      enable-cache: ${{ inputs.enable-cache }}
      cache-salt: ${{ inputs.cache-salt }}
