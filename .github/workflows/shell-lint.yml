---
name: Lint for Shell
on:
  workflow_call:
    inputs:
      search-path:
        required: false
        type: string
        description: Path to search for files
        default: .
      file-names:
        required: false
        type: string
        description: Newline-separated file names or pathspecs passed to git ls-files
        default: |
          *.sh
          *.bash
          *.bats
      enable-cache:
        required: false
        type: boolean
        description: Cache the pinned ShellCheck download when it is not preinstalled
        default: true
      cache-salt:
        required: false
        type: string
        description: Optional value used to bust the ShellCheck cache
        default: null
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-slim
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Cache ShellCheck
        if: inputs.enable-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.local/bin/shellcheck
          key: shellcheck-${{ runner.os }}-${{ runner.arch }}-v0.10.0-${{ inputs.cache-salt }}
      - name: Install ShellCheck when unavailable
        run: |
          if command -v shellcheck >/dev/null; then
            exit 0
          fi
          mkdir -p "${HOME}/.local/bin"
          if [[ ! -x "${HOME}/.local/bin/shellcheck" ]]; then
            arch=x86_64
            [[ "${RUNNER_ARCH}" == "ARM64" ]] && arch=aarch64
            curl --fail --location --silent --show-error \
              "https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.${arch}.tar.xz" \
              | tar -xJ --strip-components=1 -C "${RUNNER_TEMP}" "shellcheck-v0.10.0/shellcheck"
            install -m 0755 "${RUNNER_TEMP}/shellcheck" "${HOME}/.local/bin/shellcheck"
          fi
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - name: Execute shellcheck
        working-directory: ${{ inputs.search-path }}
        env:
          FILE_NAMES: ${{ inputs.file-names }}
        run: |
          file_names=()
          while IFS= read -r file_name; do
            [[ -n "${file_name}" ]] && file_names+=("${file_name}")
          done <<< "${FILE_NAMES}"
          git ls-files -z -- "${file_names[@]}" | xargs -0 -r -t shellcheck --external-sources
