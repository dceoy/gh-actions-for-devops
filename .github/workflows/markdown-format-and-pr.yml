---
name: Formatting for Markdown
on:
  workflow_call:
    inputs:
      search-path:
        required: false
        type: string
        description: Path to search for Markdown files
        default: .
      node-version:
        required: false
        type: string
        description: Node.js version to use
        default: latest
      use-prettier:
        required: false
        type: boolean
        description: Use Prettier to format Markdown files
        default: true
      prettier-glob:
        required: false
        type: string
        description: Glob pattern for Prettier to format
        default: '**/*.{md,mdx}'
      use-biome:
        required: false
        type: boolean
        description: Use Biome to format Markdown files
        default: false
      biome-glob:
        required: false
        type: string
        description: Glob pattern for Biome to check and write
        default: '**/*.{md,mdx}'
      runs-on:
        required: false
        type: string
        description: GitHub Actions runner to use
        default: ubuntu-slim
    secrets:
      GH_TOKEN:
        required: false
        description: GitHub token
permissions:
  contents: write
  pull-requests: write
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  format-and-pr:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Validate formatter inputs
        env:
          USE_PRETTIER: ${{ inputs.use-prettier }}
          USE_BIOME: ${{ inputs.use-biome }}
        run: |
          if ! ${USE_PRETTIER} && ! ${USE_BIOME}; then
            echo '::error::At least one of use-prettier or use-biome must be true'
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Install formatters
        run: >
          npm install -g
          ${{ inputs.use-prettier && 'prettier' || '' }}
          ${{ inputs.use-biome && '@biomejs/biome' || '' }}
      - name: Format Markdown files using Prettier
        if: inputs.use-prettier
        working-directory: ${{ inputs.search-path }}
        env:
          PRETTIER_GLOB: ${{ inputs.prettier-glob }}
        run: >
          prettier --write "${PRETTIER_GLOB}"
      - name: Format Markdown files using Biome
        if: inputs.use-biome
        working-directory: ${{ inputs.search-path }}
        env:
          BIOME_GLOB: ${{ inputs.biome-glob }}
        run: >
          biome format --write --files-ignore-unknown=true "${BIOME_GLOB}"
      - name: Create output parameters
        id: parameters
        env:
          USE_PRETTIER: ${{ inputs.use-prettier }}
          USE_BIOME: ${{ inputs.use-biome }}
          PR_BASE: ${{ github.head_ref || github.ref_name }}
        run: |
          formatters=()
          if ${USE_PRETTIER}; then
            formatters+=('prettier')
          fi
          if ${USE_BIOME}; then
            formatters+=('biome')
          fi
          if [[ "${#formatters[@]}" -gt 0 ]]; then
            formatter_text="$(IFS=', '; echo "${formatters[*]}")"
          else
            formatter_text='Markdown formatters'
          fi
          {
            echo "commit_message=Reformat Markdown files using ${formatter_text}"
            echo "pr_base=${PR_BASE}"
            echo "pr_branch=automatedpr/${PR_BASE}"
          } >> "${GITHUB_OUTPUT}"
      - name: Detect changed files and create a pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          commit-message: ${{ steps.parameters.outputs.commit_message }}
          title: ${{ steps.parameters.outputs.commit_message }}
          branch: ${{ steps.parameters.outputs.pr_branch }}
          base: ${{ steps.parameters.outputs.pr_base }}
          labels: automated pr
          body: |
            This PR contains the following updates:

            - ${{ steps.parameters.outputs.commit_message }}

            This PR has been generated by
            [${{ github.workflow_ref }}](https://github.com/${{ github.repository }}/).
          delete-branch: true
          draft: false
