---
name: Formatting for Python
on:
  workflow_call:
    inputs:
      package-path:
        required: false
        type: string
        description: Path to a Python package or project
        default: .
      python-version:
        required: false
        type: string
        description: Python version to use (not applicable if uv.lock is present)
        default: 3.x
      uv-version:
        required: false
        type: string
        description: Version of uv to use (applicable only if uv.lock is present)
        default: latest
      enable-cache:
        required: false
        type: boolean
        description: Cache dependency downloads (never formatted files or PR credentials)
        default: true
      cache-dependency-path:
        required: false
        type: string
        description: Dependency file used to scope the cache
        default: null
      cache-salt:
        required: false
        type: string
        description: Optional value used to bust the uv cache
        default: null
      use-black:
        required: false
        type: boolean
        description: Use black to format the code
        default: false
      use-isort:
        required: false
        type: boolean
        description: Use isort to sort import definitions
        default: false
      lint-before-pr:
        required: false
        type: boolean
        description: Run lint before creating a pull request
        default: true
      requirements-txt:
        required: false
        type: string
        description: Path to the requirements.txt file (not applicable if uv.lock is present)
        default: null
      runs-on:
        required: false
        type: string
        description: GitHub Actions runner to use
        default: ubuntu-slim
    secrets:
      GH_TOKEN:
        required: false
        description: GitHub token
permissions:
  contents: write
  pull-requests: write
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  format-and-pr:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Disable pip cache
        if: '! inputs.enable-cache'
        run: echo 'PIP_NO_CACHE_DIR=true' >> "${GITHUB_ENV}"
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Detect uv.lock or poetry.lock
        working-directory: ${{ inputs.package-path }}
        run: |
          if [[ -f uv.lock ]]; then
            echo "LOCK_FILE=uv.lock" >> "${GITHUB_ENV}"
          elif [[ -f poetry.lock ]]; then
            echo "LOCK_FILE=poetry.lock" >> "${GITHUB_ENV}"
          else
            echo "LOCK_FILE=" >> "${GITHUB_ENV}"
          fi
      - name: Set up uv
        if: env.LOCK_FILE == 'uv.lock'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}
          enable-cache: ${{ inputs.enable-cache }}
          cache-dependency-glob: ${{ inputs.cache-dependency-path || format('{0}/uv.lock', inputs.package-path) }}
          cache-suffix: ${{ inputs.cache-salt }}
      - name: Install packages using uv
        if: env.LOCK_FILE == 'uv.lock'
        working-directory: ${{ inputs.package-path }}
        env:
          USE_BLACK: ${{ inputs.use-black }}
          USE_ISORT: ${{ inputs.use-isort }}
        run: |
          uv sync --all-groups
          packages=()
          if [[ "${USE_BLACK}" == "true" ]]; then
            packages+=(black)
          else
            packages+=(ruff)
          fi
          [[ "${USE_ISORT}" == "true" ]] && packages+=(isort)
          uv add --dev "${packages[@]}"
          echo "EXECUTOR_KIND=uv" >> "${GITHUB_ENV}"
      - name: Set up Python
        if: env.LOCK_FILE != 'uv.lock'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: ${{ inputs.enable-cache && (inputs.cache-dependency-path != '' || env.LOCK_FILE == 'poetry.lock' || inputs.requirements-txt != '') && 'pip' || '' }}
          cache-dependency-path: ${{ inputs.cache-dependency-path || (env.LOCK_FILE == 'poetry.lock' && format('{0}/poetry.lock', inputs.package-path)) || (inputs.requirements-txt != '' && format('{0}/{1}', inputs.package-path, inputs.requirements-txt)) || '' }}
      - name: Install packages
        if: env.LOCK_FILE != 'uv.lock'
        env:
          REQUIREMENTS_TXT_PATH: ${{ inputs.requirements-txt }}
          USE_BLACK: ${{ inputs.use-black }}
          USE_ISORT: ${{ inputs.use-isort }}
        working-directory: ${{ inputs.package-path }}
        run: |
          pip install -U pip
          if [[ -n "${REQUIREMENTS_TXT_PATH}" ]]; then
            pip install -U -r "${REQUIREMENTS_TXT_PATH}"
          fi
          packages=()
          if [[ "${USE_BLACK}" == "true" ]]; then
            packages+=(black)
          else
            packages+=(ruff)
          fi
          [[ "${USE_ISORT}" == "true" ]] && packages+=(isort)
          if [[ "${LOCK_FILE}" == "poetry.lock" ]]; then
            pip install poetry
            poetry lock --no-interaction
            poetry add --group=dev --no-interaction "${packages[@]}"
            poetry install --no-interaction
            echo "EXECUTOR_KIND=poetry" >> "${GITHUB_ENV}"
          else
            pip install "${packages[@]}"
            echo "EXECUTOR_KIND=none" >> "${GITHUB_ENV}"
          fi
      - name: Format the code using ruff
        if: (! inputs.use-black)
        working-directory: ${{ inputs.package-path }}
        run: |
          case "${EXECUTOR_KIND}" in
            uv)     uv run ruff format . ;;
            poetry) poetry run ruff format . ;;
            *)      ruff format . ;;
          esac
      - name: Format the code using black
        if: inputs.use-black
        working-directory: ${{ inputs.package-path }}
        run: |
          case "${EXECUTOR_KIND}" in
            uv)     uv run black . ;;
            poetry) poetry run black . ;;
            *)      black . ;;
          esac
      - name: Sort Python import definitions using isort
        if: inputs.use-isort
        working-directory: ${{ inputs.package-path }}
        run: |
          case "${EXECUTOR_KIND}" in
            uv)     uv run isort . ;;
            poetry) poetry run isort . ;;
            *)      isort . ;;
          esac
      - name: Lint the code using ruff
        if: inputs.lint-before-pr
        working-directory: ${{ inputs.package-path }}
        run: |
          case "${EXECUTOR_KIND}" in
            uv)     uv run ruff check --fix --output-format=github . ;;
            poetry) poetry run ruff check --fix --output-format=github . ;;
            *)      ruff check --fix --output-format=github . ;;
          esac
      - name: Restore project files
        if: env.EXECUTOR_KIND == 'poetry' || env.EXECUTOR_KIND == 'uv'
        working-directory: ${{ inputs.package-path }}
        run: |
          git restore pyproject.toml "${LOCK_FILE}"
      - name: Create output parameters
        id: parameters
        env:
          USE_BLACK: ${{ inputs.use-black }}
          USE_ISORT: ${{ inputs.use-isort }}
          PR_BASE: ${{ github.head_ref || github.ref_name }}
        run: |
          if [[ "${USE_BLACK}" == "true" ]]; then
            formatters='black'
          else
            formatters='ruff'
          fi
          if [[ "${USE_ISORT}" == "true" ]]; then
            formatters="${formatters} and isort"
          fi
          {
            echo "commit_message=Reformat Python code using ${formatters}"
            echo "pr_base=${PR_BASE}"
            echo "pr_branch=github-actions/${PR_BASE}"
          } >> "${GITHUB_OUTPUT}"
      - name: Detect changed files and create a pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}  # zizmor: ignore[secrets-outside-env] caller-provided secret
          commit-message: ${{ steps.parameters.outputs.commit_message }}
          title: ${{ steps.parameters.outputs.commit_message }}
          branch: ${{ steps.parameters.outputs.pr_branch }}
          base: ${{ steps.parameters.outputs.pr_base }}
          labels: agent:github-actions
          body: |
            This PR contains the following updates:

            - ${{ steps.parameters.outputs.commit_message }}

            This PR has been generated by
            [${{ github.workflow_ref }}](https://github.com/${{ github.repository }}/).
          delete-branch: true
          draft: false
