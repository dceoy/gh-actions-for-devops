---
name: Build using PyInstaller
on:
  workflow_call:
    inputs:
      app-script-path:
        required: true
        type: string
        description: Path to a Python script
      python-version:
        required: false
        type: string
        description: Python version to use (not applicable if uv.lock is present)
        default: 3.x
      uv-version:
        required: false
        type: string
        description: Version of uv to use (applicable only if uv.lock is present)
        default: latest
      enable-cache:
        required: false
        type: boolean
        description: Cache dependency downloads (never built executables)
        default: true
      cache-dependency-path:
        required: false
        type: string
        description: Dependency file used to scope the cache
        default: null
      cache-salt:
        required: false
        type: string
        description: Optional value used to bust the uv cache
        default: null
      requirements-txt:
        required: false
        type: string
        description: Path to the requirements.txt file (not applicable if uv.lock is present)
        default: null
      artifact-name:
        required: false
        type: string
        description: Name of the artifact
        default: dist
      artifact-path:
        required: false
        type: string
        description: Path to the artifact
        default: dist
      artifact-retention-days:
        required: false
        type: number
        description: Number of days to retain artifacts
        default: 1
      artifact-overwrite:
        required: false
        type: boolean
        description: Overwrite existing artifacts
        default: true
      runs-on:
        required: false
        type: string
        description: Type of machine to run the job on
        default: windows-latest
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  bundle:
    runs-on: ${{ inputs.runs-on }}
    env:
      PIP_NO_CACHE_DIR: ${{ inputs.enable-cache && 'false' || 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Detect uv.lock or poetry.lock
        run: |
          if [[ -f uv.lock ]]; then
            echo "LOCK_FILE=uv.lock" >> "${GITHUB_ENV}"
          elif [[ -f poetry.lock ]]; then
            echo "LOCK_FILE=poetry.lock" >> "${GITHUB_ENV}"
          else
            echo "LOCK_FILE=" >> "${GITHUB_ENV}"
          fi
      - name: Set up uv
        if: env.LOCK_FILE == 'uv.lock'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}
          enable-cache: ${{ inputs.enable-cache }}
          cache-dependency-glob: ${{ inputs.cache-dependency-path || 'uv.lock' }}
          cache-suffix: ${{ inputs.cache-salt }}
      - name: Install packages using uv
        if: env.LOCK_FILE == 'uv.lock'
        run: |
          uv sync --all-groups
          uv add --dev PyInstaller
          echo "EXECUTOR_KIND=uv" >> "${GITHUB_ENV}"
      - name: Set up Python
        if: env.LOCK_FILE != 'uv.lock'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: ${{ inputs.enable-cache && (inputs.cache-dependency-path != '' || env.LOCK_FILE == 'poetry.lock' || inputs.requirements-txt != '') && 'pip' || '' }}
          cache-dependency-path: ${{ inputs.cache-dependency-path || (env.LOCK_FILE == 'poetry.lock' && 'poetry.lock') || inputs.requirements-txt || '' }}
      - name: Install packages
        if: env.LOCK_FILE != 'uv.lock'
        env:
          REQUIREMENTS_TXT_PATH: ${{ inputs.requirements-txt }}
        run: |
          if [[ "${LOCK_FILE}" == "poetry.lock" ]]; then
            python -m pip install poetry
            poetry lock --no-interaction
            poetry add --group=dev --no-interaction PyInstaller
            poetry install --no-interaction
            echo "EXECUTOR_KIND=poetry" >> "${GITHUB_ENV}"
          else
            python -m pip install -U pip
            if [[ -n "${REQUIREMENTS_TXT_PATH}" ]]; then
              python -m pip install -U -r "${REQUIREMENTS_TXT_PATH}"
            fi
            python -m pip install PyInstaller
            echo "EXECUTOR_KIND=none" >> "${GITHUB_ENV}"
          fi
      - name: Build an executable file
        env:
          APP_SCRIPT_PATH: ${{ inputs.app-script-path }}
        run: |
          case "${EXECUTOR_KIND}" in
            uv)     uv run PyInstaller --clean --noconsole --onefile "${APP_SCRIPT_PATH}" ;;
            poetry) poetry run PyInstaller --clean --noconsole --onefile "${APP_SCRIPT_PATH}" ;;
            # Bare pip installs may not expose PyInstaller on PATH; preserve prior `python -m` behavior.
            *)      python -m PyInstaller --clean --noconsole --onefile "${APP_SCRIPT_PATH}" ;;
          esac
      - name: Upload the artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.artifact-retention-days }}
          overwrite: ${{ inputs.artifact-overwrite }}
