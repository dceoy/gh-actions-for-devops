---
name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:  # checkov:skip=CKV_GHA_7:workflow_dispatch inputs are required to select the pipeline
    inputs:
      workflow:
        required: true
        type: choice
        options:
          - lint
          - analyze
          - release
          - update
        description: Choose the workflow to run
        default: lint
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  go-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'lint')
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/go-package-lint-and-scan.yml
    with:
      package-path: ./src
      go-version: stable
  github-actions-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'lint')
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/github-actions-lint-and-scan.yml
    with:
      search-path: .github/workflows
      go-version: stable
      python-version: 3.x
  github-codeql-analysis:
    if: >
      github.event_name == 'push'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'analyze')
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/github-codeql-analysis.yml
    with:
      language: >
        ["go"]
  github-release:
    if: >
      github.event_name == 'workflow_dispatch' && inputs.workflow == 'release'
    permissions:
      contents: write
    uses: ./.github/workflows/github-release.yml
    with:
      create-new-tag: false
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  github-major-version-tag:
    if: >
      github.event_name == 'workflow_dispatch' && inputs.workflow == 'release'
    needs:
      - github-release
    permissions:
      contents: write
    uses: ./.github/workflows/github-major-version-tag.yml
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  dependabot-auto-merge:
    if: >
      github.event_name == 'pull_request'
      && github.event.pull_request.user.login == 'dependabot[bot]'
    needs:
      - go-lint-and-scan
      - github-actions-lint-and-scan
    permissions:
      contents: write
      pull-requests: write
      actions: read
    uses: ./.github/workflows/dependabot-auto-merge.yml
    with:
      unconditional: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  markdown-format-and-pr:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'update')
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/markdown-format-and-pr.yml
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  update-readme-md:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'update')
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: stable
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: latest
      - name: Install dependencies
        working-directory: ./src
        run: |
          go mod download
      - name: Build the Go program
        working-directory: ./src
        env:
          VERSION: ${{ github.ref_name || github.head_ref || 'unknown' }}
        run: |
          go build -ldflags "-X main.version=${VERSION}" -o build_readme_md .
      - name: Update README.md
        working-directory: ./src
        run: |
          ./build_readme_md
      - name: Commit and push the changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321  # v10.0.0
        with:
          add: ./README.md
          message: Update README.md
          push: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
